name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    name: Run tests before building
    uses: ./.github/workflows/tests.yml

  build-windows:
    name: Build Windows .exe
    needs: [test]
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[build-windows,windows]"

      - name: Build with PyInstaller
        run: >
          pyinstaller
          --onefile
          --noconsole
          --name EVE-Alert
          --icon evealert/img/eve.ico
          --add-data "evealert/img;img"
          --add-data "evealert/sound;sound"
          --add-data "evealert/ui/theme.qss;ui"
          main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: EVE-Alert-Windows
          path: dist/EVE-Alert.exe

  release:
    name: Create GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: EVE-Alert-Windows
          path: artifacts/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/EVE-Alert.exe
          generate_release_notes: true
